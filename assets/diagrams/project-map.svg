<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fcf7f0"/>
      <stop offset="100%" stop-color="#f5efe4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffaf3"/>
      <stop offset="100%" stop-color="#f1e4cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#4d2d15" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 54px Georgia, 'Times New Roman', serif; fill: #1f1a16; }
      .subtitle { font: 400 24px Georgia, 'Times New Roman', serif; fill: #66594f; }
      .box-title { font: 700 28px Georgia, 'Times New Roman', serif; fill: #1f1a16; }
      .box-text { font: 400 22px Georgia, 'Times New Roman', serif; fill: #4a4037; }
      .small { font: 400 20px Georgia, 'Times New Roman', serif; fill: #66594f; }
      .label { font: 700 24px Georgia, 'Times New Roman', serif; fill: #8c4c23; }
      .stroke { stroke: #8c4c23; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .dash { stroke: #b98e69; stroke-width: 3; stroke-dasharray: 10 12; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <rect width="1800" height="1180" fill="url(#bg)"/>
  <circle cx="210" cy="140" r="180" fill="#8c4c23" opacity="0.07"/>
  <circle cx="1550" cy="170" r="220" fill="#8c4c23" opacity="0.05"/>

  <text x="900" y="90" text-anchor="middle" class="title">Didaskalos · Mappa Concettuale</text>
  <text x="900" y="130" text-anchor="middle" class="subtitle">Struttura attuale del progetto, dati locali e logica delle pagine</text>

  <rect x="620" y="180" rx="30" ry="30" width="560" height="110" fill="url(#panel)" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="228" text-anchor="middle" class="box-title">Didaskalos</text>
  <text x="900" y="262" text-anchor="middle" class="box-text">Sito statico per studiare il greco del Nuovo Testamento</text>

  <rect x="80" y="390" rx="26" ry="26" width="360" height="200" fill="url(#panel)" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="438" class="box-title">Interlineare</text>
  <text x="120" y="476" class="box-text">Legge il testo greco</text>
  <text x="120" y="510" class="box-text">token per token</text>
  <text x="120" y="560" class="small">Usa il significato del token</text>
  <text x="120" y="590" class="small">nel contesto del versetto</text>

  <rect x="500" y="390" rx="26" ry="26" width="360" height="200" fill="url(#panel)" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="540" y="438" class="box-title">Vocabolario</text>
  <text x="540" y="476" class="box-text">Lavora sul lemma</text>
  <text x="540" y="510" class="box-text">e sul significato base</text>
  <text x="540" y="560" class="small">Mostra significati e note</text>
  <text x="540" y="590" class="small">pulite per lo studio</text>

  <rect x="940" y="390" rx="26" ry="26" width="360" height="200" fill="url(#panel)" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="980" y="438" class="box-title">Word page</text>
  <text x="980" y="476" class="box-text">Unisce lessico, morfologia</text>
  <text x="980" y="510" class="box-text">e occorrenze nel NT</text>
  <text x="980" y="560" class="small">E il ponte tra le pagine</text>
  <text x="980" y="590" class="small">del progetto</text>

  <rect x="1360" y="390" rx="26" ry="26" width="360" height="200" fill="url(#panel)" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="1400" y="438" class="box-title">Morfologia</text>
  <text x="1400" y="476" class="box-text">Mostra paradigmi, forme</text>
  <text x="1400" y="510" class="box-text">e categorie grammaticali</text>
  <text x="1400" y="560" class="small">Usa soprattutto i dataset</text>
  <text x="1400" y="590" class="small">morfologici locali</text>

  <path d="M900 290 L260 390" class="stroke"/>
  <path d="M900 290 L680 390" class="stroke"/>
  <path d="M900 290 L1120 390" class="stroke"/>
  <path d="M900 290 L1540 390" class="stroke"/>

  <rect x="90" y="760" rx="26" ry="26" width="500" height="310" fill="#fffdfa" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="812" class="label">1. Testo greco del NT</text>
  <text x="130" y="852" class="box-text">assets/data/nt/*.json</text>
  <text x="130" y="892" class="small">Contiene libro per libro:</text>
  <text x="130" y="922" class="small">• testo greco</text>
  <text x="130" y="952" class="small">• token</text>
  <text x="130" y="982" class="small">• lemma</text>
  <text x="130" y="1012" class="small">• morfologia di base</text>

  <rect x="650" y="760" rx="26" ry="26" width="500" height="310" fill="#fffdfa" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="690" y="812" class="label">2. Interlineare</text>
  <text x="690" y="852" class="box-text">assets/data/token_glosses_fixed.json</text>
  <text x="690" y="892" class="small">Mappa fissa:</text>
  <text x="690" y="922" class="small">token preciso → significato italiano</text>
  <text x="690" y="962" class="small">Sotto il greco usa il versetto</text>
  <text x="690" y="992" class="small">CEI 2008 quando disponibile</text>

  <rect x="1210" y="760" rx="26" ry="26" width="500" height="310" fill="#fffdfa" stroke="#dac8af" stroke-width="2" filter="url(#shadow)"/>
  <text x="1250" y="812" class="label">3. Lessico e paradigmi</text>
  <text x="1250" y="852" class="box-text">lexicon.json</text>
  <text x="1250" y="892" class="small">Significato del lemma</text>
  <text x="1250" y="932" class="box-text">verb_*.json · noun_paradigms.json</text>
  <text x="1250" y="972" class="small">Paradigmi verbali, nominali</text>
  <text x="1250" y="1002" class="small">e pronominali per le schede</text>

  <path d="M260 590 C260 670, 260 700, 340 760" class="dash"/>
  <path d="M680 590 C680 670, 760 700, 900 760" class="dash"/>
  <path d="M1120 590 C1120 670, 1040 700, 900 760" class="dash"/>
  <path d="M1540 590 C1540 670, 1540 700, 1460 760" class="dash"/>

  <text x="900" y="1130" text-anchor="middle" class="small">Regola chiave: Interlineare = significato del token · Vocabolario/word page = significato del lemma · Morfologia = paradigmi</text>
</svg>

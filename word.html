<!doctype html>
<html lang="it">
  <head>
    <!--
      Pagina dedicata alla singola parola.
      Questa pagina non usa le viste interne di index.html:
      carica direttamente word-page.js e costruisce una scheda autonoma.
    -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analisi Parola | Didaskalos</title>
    <meta
      name="description"
      content="Scheda completa di una parola del greco koine: pronuncia, significato, morfologia e occorrenze."
    >
    <link id="app-styles" rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <!-- Navigazione coerente con il resto del progetto -->
    <header class="site-header">
      <nav class="main-nav">
        <a href="index.html#home">Home</a>
        <a href="index.html#interlinear">Interlineare</a>
        <a href="index.html#vocabulary">Vocabolario</a>
        <a href="index.html#grammar">Grammatica</a>
        <a href="index.html#morphology">Morfologia</a>
      </nav>
    </header>

    <!-- Punto di montaggio della scheda parola -->
    <main>
      <section id="word-page-result"></section>
    </main>

    <!-- Footer condiviso -->
    <footer class="site-footer">
      <p>Copyright &copy; Seminario Vescovile di Fiesole, LazzaroMaria <span class="copyright-cross">&#10013;&#65038;</span></p>
    </footer>

    <!--
      Stesso meccanismo di versioning usato in index.html:
      serve a evitare che Safari o altri browser restino bloccati
      su CSS/JS vecchi dopo un aggiornamento del sito.
    -->
    <script type="module">
      let appVersion = "dev";
      try {
        const response = await fetch("assets/data/version.json", { cache: "no-store" });
        if (response.ok) {
          const payload = await response.json();
          appVersion = payload.version || appVersion;
        }
      } catch {
        // Se il file versione non e disponibile, il sito continua a funzionare.
      }

      window.__APP_VERSION__ = appVersion;
      document.querySelector("#app-styles").href = `assets/css/styles.css?v=${encodeURIComponent(appVersion)}`;
      await import(`./assets/js/word-page.js?v=${encodeURIComponent(appVersion)}`);
    </script>
  </body>
</html>
